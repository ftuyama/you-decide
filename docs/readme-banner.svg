<svg xmlns="http://www.w3.org/2000/svg" width="920" height="280" viewBox="0 0 920 280" role="img" aria-labelledby="title desc">
  <title id="title">Calvário Subterrâneo  banner</title>
  <desc id="desc">Escadaria sob a cidade, brilho esverdeado e título do jogo.</desc>
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0c0b12"/>
      <stop offset="55%" stop-color="#12101c"/>
      <stop offset="100%" stop-color="#1a1424"/>
    </linearGradient>
    <radialGradient id="pulse" cx="50%" cy="85%" r="65%">
      <stop offset="0%" stop-color="#3dff9c" stop-opacity="0.45"/>
      <stop offset="45%" stop-color="#1a7a52" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0c0b12" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="stone" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2438"/>
      <stop offset="100%" stop-color="#1a1522"/>
    </linearGradient>
  </defs>
  <rect width="920" height="280" fill="url(#sky)"/>
  <ellipse cx="460" cy="260" rx="420" ry="140" fill="url(#pulse)"/>
  <!-- degraus estilizados -->
  <g opacity="0.92" fill="url(#stone)" stroke="#3d2f55" stroke-width="1">
    <path d="M180 240 L740 240 L720 200 L200 200 Z"/>
    <path d="M220 200 L700 200 L685 165 L235 165 Z"/>
    <path d="M255 165 L665 165 L652 132 L268 132 Z"/>
    <path d="M288 132 L632 132 L620 100 L300 100 Z"/>
  </g>
  <g stroke="#4ade80" stroke-opacity="0.35" stroke-width="1.2" fill="none">
    <path d="M320 100 Q460 88 600 100"/>
    <path d="M340 132 Q460 118 580 132"/>
  </g>
  <!-- portal / boca -->
  <ellipse cx="460" cy="118" rx="38" ry="22" fill="#0a0810" stroke="#5b3d8a" stroke-width="2"/>
  <ellipse cx="460" cy="118" rx="22" ry="12" fill="#142018" opacity="0.9"/>
  <!-- partículas -->
  <g fill="#7dffbc" opacity="0.55" filter="url(#glow)">
    <circle cx="380" cy="150" r="2"/>
    <circle cx="540" cy="175" r="1.5"/>
    <circle cx="420" cy="210" r="1.2"/>
    <circle cx="500" cy="195" r="1.8"/>
    <circle cx="460" cy="225" r="1"/>
  </g>
  <!-- título -->
  <text x="460" y="52" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="700" fill="#ede6ff" letter-spacing="0.06em">Calvário Subterrâneo</text>
  <text x="460" y="82" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#9ca3af" letter-spacing="0.28em">FANTASIA SOMBRIA · ESCOLHAS · LABIRINTO</text>
</svg>
